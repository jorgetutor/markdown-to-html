<!DOCTYPE html>
<html lang="en" class="h-full overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown to HTML Converter</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body class="h-full overflow-hidden bg-slate-50 text-slate-900 antialiased flex flex-col">
    <div class="flex flex-col h-full overflow-hidden w-full mx-auto px-4 py-3 gap-3">

      <header class="shrink-0 rounded-[28px] px-6 py-4">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-600">Markdown to HTML</p>
            <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Convert Markdown into HTML instantly</h1>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            <span id="global-status" aria-live="polite" class="text-sm text-slate-500"></span>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-hidden grid lg:grid-cols-[1.1fr_1fr_1.1fr] gap-3">

        <section class="flex flex-col overflow-hidden rounded-[28px] bg-white p-5">
          <div class="shrink-0 mb-3 flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between sm:gap-3">
            <div>
              <h2 class="text-lg font-semibold text-slate-900">Markdown</h2>
              <p class="mt-0.5 text-sm text-slate-500">Paste or type Markdown here.</p>
            </div>
            <button id="clear-button" type="button" class="self-end sm:self-auto flex items-center gap-1.5 rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Clear
            </button>
          </div>
          <textarea id="markdown-input" class="flex-1 min-h-0 w-full resize-none rounded-[20px] border border-slate-200 bg-slate-50 p-4 text-sm leading-6 text-slate-900 shadow-sm focus:border-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-200 overflow-auto" placeholder="Type or paste Markdown here..."></textarea>
        </section>

        <section class="flex flex-col overflow-hidden rounded-[28px] bg-white p-5">
          <div class="shrink-0 mb-3 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between sm:gap-3">
            <div>
              <h2 class="text-lg font-semibold text-slate-900">HTML Output</h2>
              <p class="mt-0.5 text-sm text-slate-500">Generated HTML</p>
            </div>
            <div class="self-end sm:self-auto flex items-center gap-2">
              <div class="flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm text-slate-700">
                <input id="autocopy-toggle" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-sky-600 focus:ring-sky-500" />
                <label for="autocopy-toggle" class="cursor-pointer">Autocopy (focus out)</label>
              </div>
              <button id="copy-button" type="button" class="flex items-center gap-1.5 rounded-full bg-sky-600 px-4 py-2 text-sm font-semibold text-white shadow transition hover:bg-sky-700 disabled:opacity-40 disabled:cursor-not-allowed disabled:pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy
              </button>
            </div>
          </div>
          <textarea id="html-output" readonly class="flex-1 min-h-0 w-full resize-none rounded-[20px] border border-slate-200 bg-slate-50 p-4 text-sm leading-6 text-slate-900 shadow-sm focus-visible:outline-none overflow-auto"></textarea>
        </section>

        <section class="flex flex-col overflow-hidden rounded-[28px] bg-white p-5">
          <div class="shrink-0 mb-3">
            <h2 class="text-lg font-semibold text-slate-900">Preview</h2>
            <p class="mt-0.5 text-sm text-slate-500">Rendered HTML preview.</p>
          </div>
          <div id="html-preview" class="flex-1 min-h-0 overflow-auto rounded-[20px] border border-slate-200 bg-white p-5 text-slate-900 shadow-sm"></div>
        </section>

      </main>
    </div>

    <a href="https://github.com/jorgetutor/markdown-to-html" class="github-corner" aria-label="View source on GitHub" target="_blank" rel="noopener noreferrer">
      <svg width="80" height="80" viewBox="0 0 250 250" style="fill:#0284c7;color:#fff;position:fixed;top:0;right:0;border:0;z-index:50;" aria-hidden="true">
        <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
        <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin:130px 106px" class="octo-arm"></path>
        <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.7,65.2 C194.3,68.6 197.5,72.8 199.9,77.1 C213.6,79.8 216.0,84.5 216.0,84.5 C212.7,92.7 206.9,95.4 205.4,95.8 C205.1,101.5 203.0,107.0 198.3,111.5 C181.9,128.1 168.3,121.8 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.8 141.5,141.6 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
      </svg>
    </a>

    <script type="module" src="src/main.js"></script>
  </body>
</html>

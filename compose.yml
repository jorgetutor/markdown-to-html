version: '3.9'

services:
  app:
    build:
      context: .
      target: dev
    ports:
      - '5174:5173'
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - pnpm-store:/pnpm-store
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

volumes:
  node_modules:
    name: markdowntohtml_node_modules
  pnpm-store:
    name: markdowntohtml_pnpm_store
